<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 구미시 자율주행 관제센터</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <header class="login-header">
                <h1>구미시 자율주행 관제센터</h1>
            </header>

            <nav class="login-tabs">
                <a href="#" class="tab-item active">로그인</a>
                <a href="#" class="tab-item">아이디 찾기</a>
                <a href="#" class="tab-item">비밀번호 찾기</a>
            </nav>

            <div class="login-content">
                <!-- 로그인 섹션 -->
                <div id="login-section" class="tab-content-item active">
                    <form id="login-form">
                        <div class="form-group">
                            <label for="username">아이디</label>
                            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
                        </div>
                        <div class="form-group">
                            <label for="password">비밀번호</label>
                            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="keep-login">
                                <span>로그인 유지</span>
                            </label>
                            <div class="helper-links">
                                <a href="#" onclick="switchTab(1)">아이디 찾기</a>
                                <span class="divider"></span>
                                <a href="#" onclick="switchTab(2)">비밀번호 찾기</a>
                            </div>
                        </div>

                        <button type="submit" class="btn-login">로그인</button>
                    </form>
                </div>

                <div id="find-id-section" class="tab-content-item">
                    <div class="form-group">
                        <label>이름</label>
                        <input type="text" placeholder="이름을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label>이메일</label>
                        <input type="email" placeholder="가입 시 등록한 이메일을 입력하세요">
                    </div>
                    <button type="button" class="btn-login">아이디 찾기</button>
                </div>

                <div id="find-pw-section" class="tab-content-item">
                    <div class="form-group">
                        <label>아이디</label>
                        <input type="text" placeholder="아이디를 입력하세요">
                    </div>
                    <div class="form-group">
                        <label>이메일</label>
                        <input type="email" placeholder="가입 시 등록한 이메일을 입력하세요">
                    </div>
                    <button type="button" class="btn-login">비밀번호 재설정 링크 발송</button>
                </div>

                <div class="signup-prompt">
                    <p>아직 회원이 아니신가요? <a href="signup.html" class="link-signup">회원가입</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-item');
        const sections = document.querySelectorAll('.tab-content-item');

        function switchTab(index) {
            // 탭 스타일 변경
            tabs.forEach((tab, i) => {
                if(i === index) tab.classList.add('active');
                else tab.classList.remove('active');
            });

            // 섹션 가시성 변경
            sections.forEach((section, i) => {
                if(i === index) section.classList.add('active');
                else section.classList.remove('active');
            });
        }

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                switchTab(index);
            });
        });
    </script>
</body>
</html>
