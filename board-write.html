<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 | 게시판 | ADBC Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .write-form {
            border-top: 2px solid var(--primary-navy);
            padding: 30px 0;
        }
        .form-row {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .form-label {
            width: 150px;
            font-weight: 700;
            color: var(--primary-navy);
        }
        .form-input {
            flex: 1;
        }
        .form-input input[type="text"], .form-input textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
        }
        .form-input textarea {
            height: 300px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div id="gnb-root"></div>


    <div class="breadcrumb-container">
        <div class="container breadcrumb">
            <span>Home</span>
            <span>게시판</span>
            <span class="active">글쓰기</span>
        </div>
    </div>

    <main class="container">
        <div class="board-container">
            <!-- Sidebar -->
            <aside class="board-sidebar">
                <h3>게시판</h3>
                <ul class="sidebar-menu">
                    <li><a href="board-notice.html" class="active">공지사항</a></li>
                    <li><a href="#">FAQ</a></li>
                    <li><a href="#">질의응답</a></li>
                    <li><a href="#">자료실</a></li>
                </ul>
            </aside>

            <!-- Write Form Content -->
            <div class="board-content">
                <div class="board-header">
                    <div class="board-title">
                        <h2 id="page-title">글쓰기</h2>
                    </div>
                </div>

                <form id="write-form" class="write-form">
                    <div class="form-row">
                        <div class="form-label">공지 설정</div>
                        <div class="form-input">
                            <label><input type="checkbox" id="is-pinned"> 본 게시물을 상단 고정공지로 설정합니다.</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-label">제목</div>
                        <div class="form-input">
                            <input type="text" id="title" placeholder="제목을 입력하세요" required>
                        </div>
                    </div>
                    <div class="form-row" style="align-items: flex-start;">
                        <div class="form-label" style="padding-top: 10px;">내용</div>
                        <div class="form-input">
                            <textarea id="content" placeholder="내용을 입력하세요" required></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-label">첨부파일</div>
                        <div class="form-input">
                            <input type="file" id="files" multiple>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">* 최대 5개까지 첨부 가능합니다.</p>
                        </div>
                    </div>

                    <div class="post-footer-btns">
                        <button type="button" class="btn-primary" style="background: var(--text-muted);" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer style="background: #f1f3f5; padding: 60px 0; text-align: center; border-top: 1px solid var(--border-color); margin-top: 80px;">
        <div class="container">
            <p style="color: var(--text-muted);">&copy; 2026 Sejong Autonomous Driving Big Data Control Center. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="board-logic.js"></script>
    <script src="main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (editId) {
                document.getElementById('page-title').innerText = '게시물 수정';
                loadPostForEdit(editId);
            }
        });

        function loadPostForEdit(id) {
            const post = getPostById(id);
            if (post) {
                document.getElementById('title').value = post.title;
                document.getElementById('content').value = post.content;
                document.getElementById('is-pinned').checked = post.isPinned;
            }
        }

        document.getElementById('write-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const isPinned = document.getElementById('is-pinned').checked;
            
            let data = getBoardData();
            
            if (editId) {
                const index = data.findIndex(p => p.id == editId);
                if (index !== -1) {
                    data[index] = {
                        ...data[index],
                        title,
                        content,
                        isPinned,
                        date: new Date().toISOString().split('T')[0] // Update date to today
                    };
                }
            } else {
                const newId = data.length > 0 ? Math.max(...data.map(p => p.id)) + 1 : 1;
                const newPost = {
                    id: newId,
                    type: 'notice',
                    isPinned,
                    title,
                    writer: '관리자',
                    date: new Date().toISOString().split('T')[0],
                    views: 0,
                    content,
                    files: [] // File upload simulation
                };
                data.push(newPost);
            }
            
            saveBoardData(data);
            alert('저장되었습니다.');
            location.href = 'board-notice.html';
        });
    </script>
</body>
</html>
