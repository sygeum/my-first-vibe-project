    <script src="board-logic.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderList();
        });

        function renderList(filteredData) {
            const tableBody = document.getElementById('board-list-body');
            const totalCountSpan = document.getElementById('total-count');
            const data = filteredData || getBoardData();
            
            totalCountSpan.innerText = data.length;
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="padding: 50px; color: var(--text-muted);">조회된 결과가 없습니다.</td></tr>';
                return;
            }

            // Sort: Pinned first, then by date desc
            const sortedData = [...data].sort((a, b) => {
                if (a.isPinned !== b.isPinned) return a.isPinned ? -1 : 1;
                return new Date(b.date) - new Date(a.date);
            });
            
            sortedData.forEach(post => {
                const tr = document.createElement('tr');
                if (post.isPinned) tr.classList.add('notice-row');
                
                tr.innerHTML = `
                    <td>${post.isPinned ? '<span class="notice-tag">공지</span>' : post.id}</td>
                    <td class="td-title"><a href="board-view.html?id=${post.id}">${post.title}</a></td>
                    <td>${post.writer}</td>
                    <td>${post.date}</td>
                    <td>${post.views}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function searchBoard() {
            const type = document.getElementById('search-type').value;
            const keyword = document.getElementById('search-keyword').value.toLowerCase();
            const allData = getBoardData();
            
            const filtered = allData.filter(post => {
                const matchTitle = post.title.toLowerCase().includes(keyword);
                const matchContent = post.content.toLowerCase().includes(keyword);
                
                if (type === 'title') return matchTitle;
                if (type === 'content') return matchContent;
                return matchTitle || matchContent;
            });
            
            renderList(filtered);
        }

        // Allow Enter key to trigger search
        document.getElementById('search-keyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBoard();
        });
    </script>
